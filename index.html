<script>
  function sortear() {
    const pessoas = document
      .getElementById("pessoas")
      .value
      .split("\n")
      .map(p => p.trim())
      .filter(Boolean);

    const temas = document
      .getElementById("temas")
      .value
      .split("\n")
      .map(t => t.trim())
      .filter(Boolean);

    const resultadoDiv = document.getElementById("resultado");

    if (pessoas.length === 0 || temas.length === 0) {
      resultadoDiv.innerHTML = "<p><strong>Preencha os dois campos.</strong></p>";
      return;
    }

    // embaralha temas
    for (let i = temas.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [temas[i], temas[j]] = [temas[j], temas[i]];
    }

    let html = "<h2>Resultado</h2><ul>";
    pessoas.forEach((pessoa, i) => {
      html += `<li><strong>${pessoa}</strong>: ${temas[i % temas.length]}</li>`;
    });
    html += "</ul>";

    resultadoDiv.innerHTML = html;
  }
</script>
